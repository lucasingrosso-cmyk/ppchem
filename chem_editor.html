<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Éditeur de Mécanismes Chimiques</title>
  
  <!-- Web Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Kekule.js CSS for the chemical editor -->
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/kekule/dist/themes/default/kekule.css" />

  <style>
    :root {
      --bg-gradient-start: #f8fafc;
      --bg-gradient-end: #e2e8f0;
      --card-bg: rgba(255, 255, 255, 0.95);
      --border-color: rgba(255, 255, 255, 0.5);
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      --primary: #2563eb;
      --text-main: #0f172a;
      --text-sub: #64748b;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-main);
    }

    /* Header styling with glassmorphism */
    .header {
      width: 100%;
      padding: 24px 0;
      text-align: center;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
      margin-bottom: 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #1e293b, #334155);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      margin: 8px 0 0;
      color: var(--text-sub);
      font-weight: 400;
      font-size: 1.05rem;
    }

    /* Main App Container */
    .app-container {
      width: 95%;
      max-width: 1300px;
      height: 75vh;
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-color);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.6s ease-out;
    }

    /* The Kekule Composer div */
    #chem-composer {
      flex: 1;
      width: 100%;
      height: 100%;
      /* overriding default kekule backgrounds to fit our theme */
      background-color: transparent !important;
    }

    /* Customizing the toolbar generated by Kekule to look more modern */
    .Kekule-Widget-Toolbar {
      background-color: #f1f5f9 !important;
      border-bottom: 1px solid #e2e8f0 !important;
    }

    /* Bottom contextual bar */
    .bottom-bar {
      padding: 16px 24px;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hints {
      font-size: 0.9rem;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .hints span {
      background: #e2e8f0;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #334155;
    }

    .export-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .export-btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
    }

    .export-btn:active {
      transform: translateY(0);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Overriding Kekule atoms to be black for textbook style strictly */
    .Kekule-Render-Default-Color {
        color: #000 !important; 
    }
  </style>

  <!-- Kekule.js Script (loaded completely) -->
  <script src="https://unpkg.com/kekule/dist/kekule.min.js"></script>
</head>
<body>

  <div class="header">
    <h1>Éditeur de Mécanismes Chimiques</h1>
    <p>Dessinez des molécules (style manuel de chimie) et ajoutez des flèches courbes (arrow pushing)</p>
  </div>

  <div class="app-container">
    <!-- The Kekule Composer widget handles the drawing canvas -->
    <div id="chem-composer" data-widget="Kekule.Editor.Composer"></div>
    
    <div class="bottom-bar">
      <div class="hints">
        💡 <span>Astuce</span> Utilisez les outils de la barre supérieure pour ajouter des atomes, des liaisons, et des flèches courbes.
      </div>
      <button class="export-btn" onclick="exportToImage()">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
        </svg>
        Exporter l'image (PNG)
      </button>
    </div>
  </div>

  <script>
    let composer;

    // Wait for Kekule logic to be completely ready
    Kekule.X.domReady(function() {
      
      // Configuration: Force textbook style (Black lines, specific bond lengths)
      // We set the default color to black (#000000) for everything like in textbooks.
      var renderConfigs = Kekule.Render.Render2DConfigs.getInstance();
      renderConfigs.setDefColor('#000000');
      
      var molDisplayConfigs = renderConfigs.getMoleculeDisplayConfigs();
      molDisplayConfigs.setDefColor('#000000');
      molDisplayConfigs.setDefAtomColor('#000000');
      molDisplayConfigs.setDefBondColor('#000000');

      // Initialize the Composer
      composer = Kekule.Widget.getWidgetById('chem-composer');
      
      // Set the default settings of the composer explicitly
      composer.getRenderConfigs().setDefColor('#000000');
      composer.getRenderConfigs().getMoleculeDisplayConfigs().setDefColor('#000000');
    });

    /**
     * Function to export the drawn content as a PNG image 
     */
    function exportToImage() {
      if (!composer) return;
      
      // Extract the chemical object drawn
      var chemObj = composer.getChemObj();
      if (!chemObj) {
        alert("La zone de dessin est vide. Dessinez d'abord un mécanisme !");
        return;
      }
      
      // Create a hidden document to render the image perfectly with white background
      var doc = composer.getDocument(); 
      // Output as Data URI (PNG)
      var imgDataUri = Kekule.IO.saveFormatData(chemObj, 'png', {
        drawOptions: {
          backgroundColor: '#ffffff', // Force white background for the PNG
          margin: 20
        }
      });
      
      if (!imgDataUri) {
         // Fallback if direct export fails : Kekule Native export
         composer.executeCommand('exportObj');
         return;
      }

      // Download the image automatically
      var a = document.createElement('a');
      a.href = imgDataUri;
      a.download = 'mecanisme_complet.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  </script>

</body>
</html>
